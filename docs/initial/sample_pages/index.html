<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

<title>kotecash — Mockup v3</title>

<!-- Dependencies (CDN for mockup only — real app uses npm packages) -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<style>
  /* ===== Design Tokens ===== */
  :root {
    --c-bg:       #F7F8F0;   /* Off-White Cream — main background */
    --c-surface:  #EDF0E8;   /* Cool Ivory — sidebar, cards */
    --c-card:     #FFFFFF;   /* Pure white — individual card rows */
    --c-primary:  #355872;   /* Steel Navy — CTAs, headings, active nav */
    --c-focus:    #7AAACE;   /* Atlantic Blue — input borders, chart fills */
    --c-accent:   #9CD5FF;   /* Sky Blue — badges, secondary indicators */
    --c-success:  #4A8C6F;   /* Sea Green — income, UNDER badges */
    --c-danger:   #C44B4B;   /* Muted Crimson — expense, OVER badges */
    --c-warning:  #D4A24E;   /* Golden Sand — warning/approaching */
    --c-ink:      #355872;   /* Deep Navy — body text */
    --c-sub:      #6B7D8E;   /* Slate Gray — labels, placeholders */
    --c-border:   rgba(53, 88, 114, 0.06);  /* Subtle borders */
    --radius:     10px;      /* Card border radius */
  }

  /* ===== Base ===== */
  body {
    background: var(--c-bg);
    color: var(--c-ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow-x: hidden;
  }

  /* ===== Background Grid Pattern ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(53, 88, 114, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(53, 88, 114, 0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  main {
    position: relative;
    z-index: 1;
    overflow-y: auto;
    min-height: 100vh;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    background: var(--c-surface);
    border-right: 1px solid var(--c-border);
    transition: width 0.2s ease;
    overflow: hidden;
  }
  .sidebar.expanded  { width: 240px; }
  .sidebar.collapsed { width: 56px; }

  /* Hide text labels when collapsed */
  .sidebar .nav-label,
  .sidebar .nav-section-label,
  .sidebar .brand-text {
    transition: opacity 0.15s;
  }
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .nav-section-label,
  .sidebar.collapsed .brand-text,
  .sidebar.collapsed .collapse-hint {
    opacity: 0;
    width: 0;
    display: none;
  }

  .toggle-btn {
    cursor: pointer;
    transition: transform 0.2s;
  }
  .sidebar.collapsed .toggle-btn {
    transform: rotate(180deg);
  }

  /* ===== Navigation ===== */
  .nav-item {
    color: var(--c-sub);
    transition: all 0.15s;
    white-space: nowrap;
    border-radius: var(--radius);
    padding: 10px 12px;
    margin: 1px 4px;
  }
  .nav-item:hover {
    color: var(--c-primary);
    background: rgba(53, 88, 114, 0.05);
  }
  .nav-item.active {
    color: var(--c-primary);
    background: rgba(53, 88, 114, 0.08);
    font-weight: 600;
  }

  .nav-section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--c-sub);
    letter-spacing: 0.06em;
    padding: 16px 12px 6px;
    text-transform: uppercase;
  }

  /* ===== Cards ===== */
  .card {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: var(--radius);
  }

  /* Individual row card (Budgets, Ledger, Cicilan) */
  .card-row {
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
    transition: box-shadow 0.15s;
  }
  .card-row:hover {
    box-shadow: 0 1px 4px rgba(53, 88, 114, 0.05);
  }

  /* ===== Buttons ===== */
  .btn-primary {
    background: var(--c-primary);
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: var(--radius);
    font-weight: 600;
  }
  .btn-primary:hover {
    background: #2A4A63;
  }

  /* ===== Status Badges ===== */
  .badge-under {
    color: var(--c-success);
    background: rgba(74, 140, 111, 0.08);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-over {
    color: var(--c-danger);
    background: rgba(196, 75, 75, 0.08);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-track {
    color: var(--c-focus);
    background: rgba(122, 170, 206, 0.10);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  /* ===== Health Metrics Tags ===== */
  .health-tag {
    background: rgba(53, 88, 114, 0.04);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  /* ===== Typography ===== */
  .mono {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--c-sub);
    margin-top: -4px;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--c-sub);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ===== Page Visibility ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== Mobile Nav ===== */
  .mobile-nav { display: none; }
  @media (max-width: 768px) {
    .sidebar { display: none !important; }
    .mobile-nav {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--c-surface);
      border-top: 1px solid var(--c-border);
      z-index: 50;
      justify-content: space-around;
      padding: 6px 0;
      /* height for calc reference */
      height: 56px;
    }
    .main-content {
      margin-left: 0 !important;
      padding-top: 20px !important;
      padding-bottom: 80px !important;
    }
    .flex.min-h-screen {
      min-height: auto;
    }
    .card-row {
      flex-wrap: wrap;
    }
    /* Modal → bottom sheet on mobile */
    .modal-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-content {
      background: var(--c-card); border-radius: 16px 16px 0 0;
      width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
      padding: 20px; animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @media (min-width: 769px) {
      .modal-mask { align-items: center; }
      .modal-content { border-radius: 12px; margin: 16px; max-height: 80vh; }
    }
  }

  /* ===== Form Elements ===== */
  input[type=range] {
    accent-color: var(--c-primary);
  }

  /* ===== Charts ===== */
  canvas {
    max-width: 100%;
  }
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- MOBILE BOTTOM NAVIGATION -->
<!-- ============================================================ -->
<nav class="mobile-nav" id="mobileNav"></nav>

<!-- ============================================================ -->
<!-- MAIN LAYOUT -->
<!-- ============================================================ -->
<div class="flex min-h-screen">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar expanded fixed left-0 top-0 bottom-0 z-40 flex flex-col" id="sidebar">
    <!-- Brand -->
    <div class="flex items-center justify-between px-3 py-4">
      <span class="brand-text text-lg font-bold" style="color: var(--c-primary);">
        kotecash
      </span>
      <button onclick="toggleSidebar()"
              class="toggle-btn p-1"
              style="color: var(--c-sub);"
              onmouseover="this.style.color='var(--c-primary)'"
              onmouseout="this.style.color='var(--c-sub)'">
        <i data-lucide="panel-left-close" class="w-4 h-4" id="toggleIcon"></i>
      </button>
    </div>

    <!-- Navigation (populated by JS) -->
    <nav id="sidebarNav" class="flex flex-col flex-1 px-1 overflow-y-auto"></nav>

    <!-- Logout -->
    <div class="px-3 pb-2">
      <a href="login.html"
         class="nav-item flex items-center gap-3"
         style="display: flex;">
        <i data-lucide="log-out" class="w-4 h-4 flex-shrink-0"></i>
        <span class="nav-label text-sm">Logout</span>
      </a>
    </div>

    <!-- Version footer -->
    <div class="collapse-hint px-3 pb-4" style="font-size: 10px; color: var(--c-sub);">
      v0.3 mockup — design reference
    </div>
  </aside>

  <!-- ===== MAIN CONTENT AREA ===== -->
  <main class="main-content flex-1 transition-all duration-200 p-5 md:p-8"
        id="mainContent"
        style="margin-left: 240px;">
    <div id="pageContent"></div>
  </main>

</div>

<!-- APPLICATION JAVASCRIPT -->

<script>
/* =================================================================
   kotecash Mockup — Client-Side Router & Mock Data
   All mock data is inline. Real app replaces this with API calls.
   ================================================================= */

// ─── State ──────────────────────────────────────────────────────
var sidebarExpanded = true;
var currentPage     = 'dashboard';
var charts          = {};   // Chart.js instances, destroyed on page switch

// ─── Sidebar Toggle ─────────────────────────────────────────────
function toggleSidebar() {
  sidebarExpanded = !sidebarExpanded;

  var sidebar = document.getElementById('sidebar');
  var main    = document.getElementById('mainContent');
  var icon    = document.getElementById('toggleIcon');

  sidebar.classList.toggle('expanded',  sidebarExpanded);
  sidebar.classList.toggle('collapsed', !sidebarExpanded);
  main.style.marginLeft = sidebarExpanded ? '240px' : '56px';

  icon.setAttribute('data-lucide',
    sidebarExpanded ? 'panel-left-close' : 'panel-left-open'
  );
  lucide.createIcons();
}

// ─── Navigation Definition ──────────────────────────────────────
// Grouped into sections matching the sidebar design spec
var navSections = [
  {
    label: 'CORE',
    items: [
      { id: 'dashboard',  label: 'Dashboard',   icon: 'layout-dashboard' },
      { id: 'ledger',     label: 'Ledger',       icon: 'scroll-text'      },
      { id: 'stats',      label: 'Statistics',   icon: 'bar-chart-3'      },
    ]
  },
  {
    label: 'MANAGE',
    items: [
      { id: 'categories', label: 'Categories',   icon: 'tags'             },
      { id: 'budgets',    label: 'Budgets',       icon: 'wallet'           },
      { id: 'creditcard', label: 'Credit Card',   icon: 'credit-card'      },
      { id: 'wallets',    label: 'Wallets',        icon: 'wallet'            },
      { id: 'cicilan',    label: 'Cicilan',       icon: 'landmark'         },
    ]
  },
  {
    label: 'ANALYZE',
    items: [
      { id: 'networth',   label: 'Net Worth',     icon: 'line-chart'       },
      { id: 'scenarios',  label: 'What-If',        icon: 'calculator'       },
      { id: 'goals',      label: 'Goals',          icon: 'target'            },
      { id: 'assets',     label: 'Assets',         icon: 'briefcase'        },
    ]
  },
  {
    label: 'SETTINGS',
    items: [
      { id: 'account',    label: 'Account',        icon: 'user'             },
      { id: 'api',        label: 'API & AI',        icon: 'key'              },
    ]
  },
];

// Mobile nav: 5 items max — grouped for non-focused pages
var mobileNavItems = [
  { id: 'dashboard',  label: 'Home',    icon: 'layout-dashboard' },
  { id: 'ledger',     label: 'Ledger',  icon: 'scroll-text'      },
  { id: 'stats',      label: 'Stats',   icon: 'bar-chart-3'      },
  { id: 'cicilan',    label: 'Debt',    icon: 'credit-card'      },
  { id: 'more',       label: 'More',    icon: 'ellipsis'         },
];

// Build sidebar nav HTML
function buildNav(container, isMobile) {
  var html = '';

  if (!isMobile) {
    // Desktop: grouped with section labels
    navSections.forEach(function (section) {
      html += '<div class="nav-section-label">' + section.label + '</div>';
      section.items.forEach(function (page) {
        var isActive = (section.label === 'CORE' && page.id === 'dashboard') ? ' active' : '';
        html += '<a href="#" onclick="navigate(\'' + page.id + '\'); return false;"' +
                ' class="nav-item flex items-center gap-3' + isActive + '"' +
                ' data-page="' + page.id + '">' +
                '<i data-lucide="' + page.icon + '" class="w-4 h-4 flex-shrink-0"></i>' +
                '<span class="nav-label text-sm">' + page.label + '</span>' +
                '</a>';
      });
    });
  } else {
    // Mobile: 5 items compact
    mobileNavItems.forEach(function (item) {
      var isActive = (item.id === 'dashboard') ? ' active' : '';
      html += '<a href="#" onclick="handleMobileNav(\'' + item.id + '\'); return false;"' +
              ' class="nav-item flex flex-col items-center gap-0.5 px-1 py-1 rounded-lg"' +
              ' style="font-size:10px; color: var(--c-sub);"' +
              ' data-page="' + item.id + '">' +
              '<i data-lucide="' + item.icon + '" class="w-4 h-4"></i>' +
              '<span class="nav-label">' + item.label + '</span>' +
              '</a>';
    });
  }

  container.innerHTML = html;
  lucide.createIcons();
}

// Init both navs
buildNav(document.getElementById('sidebarNav'), false);
buildNav(document.getElementById('mobileNav'),  true);

// ─── Page Router ────────────────────────────────────────────────
function navigate(pageId) {
  // Destroy previous Chart.js instances
  Object.values(charts).forEach(function (c) {
    try { c.destroy(); } catch (e) { /* ignore */ }
  });
  charts = {};

  currentPage = pageId;

  // Update active state in sidebar (desktop only — mobile nav uses handleMobileNav)
  document.querySelectorAll('#sidebarNav .nav-item').forEach(function (el) {
    el.classList.toggle('active', el.dataset.page === pageId);
  });

  // Render page HTML
  document.getElementById('pageContent').innerHTML = renderPage(pageId);
  lucide.createIcons();

  // Initialize charts after DOM is ready
  setTimeout(function () {
    if (pageId === 'stats')     initStatsCharts();
    if (pageId === 'networth')  initNetWorthChart();
    if (pageId === 'scenarios') initScenarioChart();
  }, 50);
}

// ─── Page Dispatcher ────────────────────────────────────────────
function renderPage(id) {
  switch (id) {
    case 'dashboard':  return renderDashboard();
    case 'ledger':     return renderLedger();
    case 'stats':      return renderStats();
    case 'categories': return renderCategories();
    case 'budgets':    return renderBudgets();
    case 'cicilan':    return renderCicilan();
    case 'creditcard': return renderCreditCard();
    case 'wallets':    return renderWallets();
    case 'goals':      return renderGoals();
    case 'networth':   return renderNetWorth();
    case 'scenarios':  return renderScenarios();
    case 'assets':     return renderAssets();
    case 'account':    return renderAccount();
    case 'api':        return renderAPI();
    default:           return '<p>Page not found</p>';
  }
}

// Mobile "More" menu handler
var mobileMoreOpen = false;
function handleMobileNav(id) {
  if (id === 'more') {
    var items = [
      { id: 'categories', label: 'Categories', icon: 'tags' },
      { id: 'budgets',    label: 'Budgets',    icon: 'wallet' },
      { id: 'creditcard', label: 'Credit Card',icon: 'credit-card' },
      { id: 'wallets',    label: 'Wallets',    icon: 'wallet' },
      { id: 'networth',   label: 'Net Worth',  icon: 'line-chart' },
      { id: 'scenarios',  label: 'What-If',    icon: 'calculator' },
      { id: 'assets',     label: 'Assets',     icon: 'briefcase' },
      { id: 'goals',      label: 'Goals',      icon: 'target' },
      { id: 'account',    label: 'Account',    icon: 'user' },
      { id: 'api',        label: 'API & AI',   icon: 'key' },
    ];
    var html = '<div style="position:fixed;bottom:56px;left:0;right:0;background:var(--c-surface);'
             + 'padding:10px 8px 12px;z-index:60;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;">'
             + items.map(function(item) {
                 return '<a href="#" onclick="closeMobileMore();navigate(\'' + item.id + '\');return false;"'
                      + 'class="flex flex-col items-center gap-1 px-2 py-3 rounded-lg hover:bg-[rgba(53,88,114,0.05)]"'
                      + 'style="color:var(--c-sub);font-size:10px;text-decoration:none;">'
                      + '<i data-lucide="' + item.icon + '" class="w-5 h-5"></i>'
                      + '<span>' + item.label + '</span></a>';
               }).join('')
             + '</div>';
    var existing = document.getElementById('mobileMoreMenu');
    if (existing) { existing.remove(); mobileMoreOpen = false; return; }
    var div = document.createElement('div');
    div.id = 'mobileMoreMenu';
    div.innerHTML = html;
    document.body.appendChild(div);
    lucide.createIcons();
    mobileMoreOpen = true;
    return;
  }
  closeMobileMore();
  navigate(id);
}
function closeMobileMore() {
  var el = document.getElementById('mobileMoreMenu');
  if (el) el.remove();
  mobileMoreOpen = false;
}

// Wallet helpers
function walletBalance(name) {
  var bal = 0;
  M.walletTxns.forEach(function(t) {
    if (t.wallet !== name) return;
    if (t.type === 'income' || t.type === 'transfer_in') bal += t.amount;
    else bal -= t.amount;
  });
  return bal;
}

function walletEarmarked(name) {
  return M.earmarks.filter(function(e) { return e.source === name; })
    .reduce(function(s, e) { return s + e.amount; }, 0);
}

function walletFree(name) {
  return walletBalance(name) - walletEarmarked(name);
}

function goalProgress(name) {
  return M.earmarks.filter(function(e) { return e.goal === name; })
    .reduce(function(s, e) { return s + e.amount; }, 0);
}

// Ledger dropdown toggle
function toggleWalletDetail(card) {
  var d = card.querySelector('.wallet-detail');
  if (d) d.style.display = d.style.display === 'block' ? 'none' : 'block';
}

function toggleLedgerDropdown(btn) {
  var row = btn.closest('.ledger-row');
  var dropdown = row.querySelector('.ledger-dropdown');
  var isOpen = dropdown.style.display === 'block';
  document.querySelectorAll('.ledger-dropdown').forEach(function(d) { d.style.display = 'none'; });
  dropdown.style.display = isOpen ? 'none' : 'block';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.ledger-dropdown') && !e.target.closest('.ledger-kebab')) {
    document.querySelectorAll('.ledger-dropdown').forEach(function(d) { d.style.display = 'none'; });
  }
});

// Format number to Indonesian locale (e.g., 11774644 → "11.774.644")
function fmt(n) {
  return n.toLocaleString('id-ID');
}

// Format decimal to percentage string (e.g., 0.308 → "30.8%")
function pct(n) {
  return (n * 100).toFixed(1) + '%';
}

// Savings rate → health badge tier
function healthBadge(rate) {
  if (rate >= 0.3) return ['Outstanding',         'bg-[#4A8C6F] text-white', 'award'         ];
  if (rate >= 0.2) return ['Excellent',           'bg-[#7AAACE] text-white', 'star'          ];
  if (rate >= 0.1) return ['Good',                'bg-[#D4A24E] text-white', 'thumbs-up'     ];
  return              ['Needs Improvement',       'bg-[#C44B4B] text-white', 'alert-triangle'];
}

// Budget actual vs budget → status badge
function budgetBadge(actual, budget) {
  var ratio = budget > 0 ? actual / budget : 0;
  if (ratio > 1)   return ['OVER',      'badge-over',   'alert-triangle' ];
  if (ratio > 0.9) return ['ON TRACK',  'badge-track',  'check-circle'   ];
  return             ['UNDER',           'badge-under',  'check-circle-2' ];
}

// ─── CICILAN ────────────────────────────────────────────────────
function renderCicilan() {
  var cards = M.cicilan.map(function (c, idx) {
    var monthsLeft = Math.ceil(c.sisa / c.monthly);
    var pctPaid    = ((c.total - c.sisa) / c.total * 100).toFixed(0);

    // Build amortization table with Month+Year labels
    var amortRows = '';
    var remaining = c.sisa;
    var monthlyRate = c.bunga / 100 / 12;
    var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var startDate = c.start ? new Date(c.start) : new Date();
    for (var m = 1; m <= monthsLeft; m++) {
      var interestPayment = Math.round(remaining * monthlyRate);
      var principalPayment = c.monthly - interestPayment;
      if (m === monthsLeft) {
        principalPayment = remaining;
        interestPayment = c.monthly - principalPayment;
        if (interestPayment < 0) interestPayment = 0;
      }
      remaining -= principalPayment;
      if (remaining < 0) remaining = 0;
      var d = new Date(startDate);
      d.setMonth(d.getMonth() + m);
      var monthLabel = monthNames[d.getMonth()] + ' ' + d.getFullYear();
      amortRows += '<tr style="font-size:11px;"><td class="p-1">' + monthLabel + '</td><td class="p-1 text-right mono">Rp' + fmt(c.monthly) + '</td><td class="p-1 text-right mono">Rp' + fmt(principalPayment) + '</td><td class="p-1 text-right mono">Rp' + fmt(interestPayment) + '</td><td class="p-1 text-right mono">Rp' + fmt(remaining) + '</td></tr>';
      if (remaining <= 0) break;
    }

    return (
      '<div class="card p-5 mb-3" onclick="toggleCicilan(this)" style="cursor:pointer;">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;min-height:40px;">' +
          '<div>' +
            '<h3 class="font-semibold">' + c.name +
              ' <button onclick="event.stopPropagation();showEditCicilan(' + idx + ')" style="background:none;border:none;cursor:pointer;color:var(--c-sub);font-size:11px;margin-left:4px;" title="Edit"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>' +
              ' <span style="font-size:10px;color:var(--c-sub);">click for schedule</span></h3>' +
            '<p class="text-xs" style="color: var(--c-sub);">Active · ' + monthsLeft + ' months remaining</p>' +
          '</div>' +
          '<span class="mono text-lg font-bold flex-shrink-0" style="color: var(--c-primary);">Rp' + fmt(c.sisa) + '</span>' +
        '</div>' +
        '<div style="height:6px;border-radius:3px;margin-bottom:16px;background:var(--c-bg);">' +
          '<div style="height:6px;border-radius:3px;width:' + pctPaid + '%;background:var(--c-focus);"></div>' +
        '</div>' +
        '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">' +
          '<div><span style="color: var(--c-sub);">Monthly</span><br><span class="mono">Rp' + fmt(c.monthly) + '</span></div>' +
          '<div><span style="color: var(--c-sub);">Interest</span><br><span class="mono">' + c.bunga + '%</span></div>' +
          '<div><span style="color: var(--c-sub);">Due Date</span><br><span class="mono">' + c.due + '</span></div>' +
          '<div><span style="color: var(--c-sub);">Total</span><br><span class="mono">Rp' + fmt(c.total) + '</span></div>' +
        '</div>' +
        // Amortization table (hidden by default)
        '<div class="cicilan-expand" style="display:none;margin-top:16px;padding-top:12px;border-top:1px solid var(--c-border);">' +
          '<div class="text-xs font-semibold mb-2" style="color: var(--c-sub);">Payment Schedule</div>' +
          '<div style="overflow-x:auto;"><table class="w-full" style="font-size:11px;">' +
            '<thead><tr style="color:var(--c-sub);text-transform:uppercase;font-size:10px;letter-spacing:0.03em;">' +
              '<th class="p-1 text-left">Month</th><th class="p-1 text-right">Payment</th><th class="p-1 text-right">Principal</th><th class="p-1 text-right">Interest</th><th class="p-1 text-right">Remaining</th></tr></thead>' +
            '<tbody>' + amortRows + '</tbody></table></div>' +
          '<div class="text-xs mt-2" style="color:var(--c-success);">Debt-free in ' + monthsLeft + ' months</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<h1 class="text-2xl font-bold" style="color: var(--c-primary);">Cicilan</h1>' +
    '<p class="page-subtitle">Track your active installments and debt payments — click a card to see month-by-month schedule</p>' +
    '<div class="flex justify-end mb-4">' +
      '<button class="btn-primary px-4 py-2 rounded-lg text-sm flex items-center gap-1.5" onclick="showAddCicilan()">' +
        '<i data-lucide="plus" class="w-4 h-4"></i> Add Cicilan' +
      '</button>' +
    '</div>' +
    cards
  );
}

// Toggle cicilan amortization expand
function toggleCicilan(card) {
  var expand = card.querySelector('.cicilan-expand');
  if (!expand) return;
  var isVisible = expand.style.display !== 'none';
  expand.style.display = isVisible ? 'none' : 'block';
}

// Interactive scenario update (called on slider input)
function updateScenario() {
  var incPct = parseInt(document.getElementById('incomeSlider').value);
  var expPct = parseInt(document.getElementById('expenseSlider').value);

  // Update labels
  document.getElementById('incomeVal').textContent  = (incPct >= 0 ? '+' : '') + incPct + '%';
  document.getElementById('expenseVal').textContent = (expPct >= 0 ? '+' : '') + expPct + '%';

  // Calculate new values
  var newInc = M.income * (1 + incPct / 100);
  var newExp = M.expense * (1 + expPct / 100);
  var newNet = newInc - newExp;
  var newSR  = newInc > 0 ? (newNet / newInc) : 0;
  var totalCicilan = M.cicilan.reduce(function (s, c) { return s + c.monthly; }, 0);
  var newDTI = newInc > 0 ? (totalCicilan / newInc) : 0;

  // Color helpers
  var incColor = incPct >= 0 ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';
  var expColor = expPct <= 0 ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';
  var srColor  = newSR >= M.savingsRate ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';
  var dtiColor = newDTI < 0.3 ? 'text-[#4A8C6F]' : (newDTI < 0.5 ? 'text-[#D4A24E]' : 'text-[#C44B4B]');
  var netColor = newNet >= 0 ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';

  // Scenario cards
  document.getElementById('scenarioCards').innerHTML =
    '<div class="card p-4 text-center">' +
      '<div class="text-[10px] uppercase mb-1" style="color: var(--c-sub);">New Income</div>' +
      '<div class="mono font-bold ' + incColor + '">Rp' + fmt(Math.round(newInc)) + '</div>' +
    '</div>' +
    '<div class="card p-4 text-center">' +
      '<div class="text-[10px] uppercase mb-1" style="color: var(--c-sub);">New Expense</div>' +
      '<div class="mono font-bold ' + expColor + '">Rp' + fmt(Math.round(newExp)) + '</div>' +
    '</div>' +
    '<div class="card p-4 text-center">' +
      '<div class="text-[10px] uppercase mb-1" style="color: var(--c-sub);">New Savings Rate</div>' +
      '<div class="mono text-lg font-bold ' + srColor + '">' + pct(newSR) + '</div>' +
    '</div>' +
    '<div class="card p-4 text-center">' +
      '<div class="text-[10px] uppercase mb-1" style="color: var(--c-sub);">New DTI</div>' +
      '<div class="mono text-lg font-bold ' + dtiColor + '">' + pct(newDTI) + '</div>' +
    '</div>';

  // Detailed table
  var netDelta     = Math.round(newNet - M.net);
  var netDeltaSign = netDelta >= 0 ? '+' : '';
  var netDeltaColor = netDelta >= 0 ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';
  var srDelta     = Math.abs(newSR - M.savingsRate);
  var srDeltaSign = newSR >= M.savingsRate ? '+' : '';
  var srDeltaColor = newSR >= M.savingsRate ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';
  var dtiDelta    = Math.abs(newDTI - M.dti);
  var dtiArrow    = newDTI <= M.dti ? '↓' : '↑';
  var dtiDeltaColor = newDTI <= M.dti ? 'text-[#4A8C6F]' : 'text-[#C44B4B]';
  var incSign = incPct >= 0 ? '+' : '';
  var expSign = expPct >= 0 ? '+' : '';

  document.getElementById('scenarioDetail').innerHTML =
    '<table class="w-full">' +
      '<thead>' +
        '<tr class="border-b" style="border-color: rgba(53,88,114,0.08); font-size: 10px; color: var(--c-sub); text-transform: uppercase; letter-spacing: 0.05em;">' +
          '<th class="p-2 text-left">Metric</th>' +
          '<th class="p-2 text-right">Current</th>' +
          '<th class="p-2 text-right">Scenario</th>' +
          '<th class="p-2 text-right">Δ</th>' +
        '</tr>' +
      '</thead>' +
      '<tbody>' +
        '<tr class="border-b" style="border-color: rgba(53,88,114,0.04);">' +
          '<td class="p-2">Income</td>' +
          '<td class="p-2 text-right mono">Rp' + fmt(M.income) + '</td>' +
          '<td class="p-2 text-right mono ' + incColor + '">Rp' + fmt(Math.round(newInc)) + '</td>' +
          '<td class="p-2 text-right mono">' + incSign + incPct + '%</td>' +
        '</tr>' +
        '<tr class="border-b" style="border-color: rgba(53,88,114,0.04);">' +
          '<td class="p-2">Expense</td>' +
          '<td class="p-2 text-right mono">Rp' + fmt(M.expense) + '</td>' +
          '<td class="p-2 text-right mono ' + expColor + '">Rp' + fmt(Math.round(newExp)) + '</td>' +
          '<td class="p-2 text-right mono">' + expSign + expPct + '%</td>' +
        '</tr>' +
        '<tr class="border-b" style="border-color: rgba(53,88,114,0.04);">' +
          '<td class="p-2">Net Balance</td>' +
          '<td class="p-2 text-right mono">Rp' + fmt(M.net) + '</td>' +
          '<td class="p-2 text-right mono ' + netColor + '">Rp' + fmt(Math.abs(Math.round(newNet))) + '</td>' +
          '<td class="p-2 text-right mono ' + netDeltaColor + '">' + netDeltaSign + fmt(netDelta) + '</td>' +
        '</tr>' +
        '<tr class="border-b" style="border-color: rgba(53,88,114,0.04);">' +
          '<td class="p-2">Savings Rate</td>' +
          '<td class="p-2 text-right mono">' + pct(M.savingsRate) + '</td>' +
          '<td class="p-2 text-right mono font-bold ' + srColor + '">' + pct(newSR) + '</td>' +
          '<td class="p-2 text-right mono ' + srDeltaColor + '">' + srDeltaSign + pct(srDelta) + '</td>' +
        '</tr>' +
        '<tr>' +
          '<td class="p-2">DTI Ratio</td>' +
          '<td class="p-2 text-right mono">' + pct(M.dti) + '</td>' +
          '<td class="p-2 text-right mono">' + pct(newDTI) + '</td>' +
          '<td class="p-2 text-right mono ' + dtiDeltaColor + '">' + dtiArrow + ' ' + pct(dtiDelta) + '</td>' +
        '</tr>' +
      '</tbody>' +
    '</table>';

  // Update chart
  updateScenarioChart(newSR);
}

// Open a modal with custom title + body HTML
function openModal(title, bodyHTML) {
  var mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.onclick = function (e) { if (e.target === mask) closeModal(); };

  mask.innerHTML =
    '<div class="modal-content">' +
      '<div class="flex items-center justify-between mb-4">' +
        '<h2 class="text-lg font-bold" style="color: var(--c-primary);">' + title + '</h2>' +
        '<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--c-sub);font-size:20px;line-height:1;">&times;</button>' +
      '</div>' +
      bodyHTML +
    '</div>';

  document.body.appendChild(mask);
}

function closeModal() {
  var masks = document.querySelectorAll('.modal-mask');
  masks.forEach(function (m) { m.remove(); });
}

// Close on Escape
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') closeModal();
});

function toggleWalletDetail(card) {
  var d = card.querySelector('.wallet-detail');
  if (d) d.style.display = d.style.display === 'block' ? 'none' : 'block';
}

function renderWallets() {
  var totalLiquid = 0;
  M.wallets.forEach(function(w) { totalLiquid += walletBalance(w.name); });

  var walletCards = M.wallets.map(function(w, idx) {
    var bal = walletBalance(w.name);
    var bd = (function() {
      var ins = 0, outs = 0, exp = 0, xIn = 0, xOut = 0;
      M.walletTxns.forEach(function(t) {
        if (t.wallet !== w.name) return;
        if (t.type === 'income') ins += t.amount;
        else if (t.type === 'transfer_in') xIn += t.amount;
        else if (t.type === 'transfer_out') xOut += t.amount;
        else exp += t.amount;
      });
      return { income: ins, expense: exp, transferIn: xIn, transferOut: xOut };
    })();

    var isNeg = bal < 0;
    var walletIcon = w.type === 'bank' ? 'building-2' : w.type === 'e-wallet' ? 'smartphone' : 'banknote';
    var iconBg = w.type === 'bank' ? 'rgba(122,170,206,0.08)' : w.type === 'e-wallet' ? 'rgba(74,140,111,0.08)' : 'rgba(212,162,78,0.08)';
    var iconColor = w.type === 'bank' ? 'var(--c-focus)' : w.type === 'e-wallet' ? 'var(--c-success)' : 'var(--c-warning)';

    var txnRows = M.walletTxns.filter(function(t) { return t.wallet === w.name; }).slice(0, 8).map(function(t) {
      var isIn = t.type === 'income' || t.type === 'transfer_in';

    }).join('');

    return '<div class="card p-4 mb-3" onclick="toggleWalletDetail(this)" style="cursor:pointer;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;">' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:' + iconBg + ';">' +

        '</div>' +
        '<div class="text-right"><div class="mono text-base font-bold ' + (isNeg ? 'text-[#C44B4B]' : 'text-[#4A8C6F]') + '">Rp' + fmt(Math.abs(bal)) + '</div><div class="text-[10px]" style="color:var(--c-sub);">' + (isNeg ? 'deficit' : 'available') + '</div></div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-top:12px;" onclick="event.stopPropagation();">' +
        '<button class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-medium" style="background:rgba(74,140,111,0.08);color:var(--c-success);" onclick="showWalletIncome(' + idx + ')"><i data-lucide="plus" class="w-3 h-3"></i> Income</button>' +

        '</div>' +
        '<div class="flex justify-between text-xs font-semibold px-2 py-2 rounded mb-3" style="background:rgba(53,88,114,0.04);"><span>Net Balance</span><span class="mono ' + (bal >= 0 ? 'text-[#4A8C6F]' : 'text-[#C44B4B]') + '">Rp' + fmt(Math.abs(bal)) + '</span></div>' +
        '<div class="text-[10px] font-semibold uppercase mb-2" style="color:var(--c-sub);letter-spacing:0.05em;">Activity</div>' +
        (txnRows || '<div class="text-xs" style="color:var(--c-sub);">No transactions yet</div>') +
      '</div></div>';
  }).join('');

  return (
    '<h1 class="text-2xl font-bold" style="color:var(--c-primary);">Wallets</h1>' +

    '</div>' +
    walletCards
  );

function renderGoals() {
  var totalEarmarked = M.earmarks.reduce(function(s, e) { return s + e.amount; }, 0);

  var goalCards = M.goals.map(function(g, idx) {
    var prog = goalProgress(g.name);
    var pctD = g.target > 0 ? (prog / g.target * 100) : 0;
    var rem = g.target - prog;

    var earmarkRows = M.earmarks.filter(function(e) { return e.goal === g.name; })
      .map(function(e) {
        return '<div class="flex items-center justify-between text-[11px] py-1 px-2 rounded" style="background:rgba(53,88,114,0.02);"><span style="color:var(--c-sub);">' + e.source + '</span><span class="mono font-medium" style="color:var(--c-ink);">Rp' + fmt(e.amount) + '</span></div>';
      }).join('');

    return '<div class="card p-5 mb-3">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">' +
        '<div class="flex items-center gap-3">' +
          '<div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(122,170,206,0.10);">' +
            '<i data-lucide="' + g.icon + '" class="w-5 h-5" style="color:var(--c-focus);"></i></div>' +
          '<div><h3 class="font-semibold">' + g.name + '</h3><p class="text-xs" style="color:var(--c-sub);">Target: Rp' + fmt(g.target) + '</p></div>' +
        '</div>' +
        '<div class="text-right"><div class="mono text-lg font-bold ' + (prog >= g.target ? 'text-[#4A8C6F]' : 'text-[#355872]') + '">Rp' + fmt(prog) + '</div><div class="text-[10px]" style="color:var(--c-sub);">' + pctD.toFixed(0) + '%</div></div>' +
      '</div>' +
      '<div style="height:8px;border-radius:4px;margin-bottom:16px;background:var(--c-bg);"><div style="height:8px;border-radius:4px;width:' + Math.min(pctD, 100) + '%;background:' + (pctD >= 100 ? 'var(--c-success)' : 'var(--c-focus)') + ';"></div></div>' +
      '<div class="text-[10px] font-semibold uppercase mb-2" style="color:var(--c-sub);letter-spacing:0.05em;">Earmarked From</div>' +
      (earmarkRows || '<div class="text-xs" style="color:var(--c-sub);">No allocations yet</div>') +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">' +
        '<span class="text-xs" style="color:var(--c-sub);">' + (rem > 0 ? 'Rp' + fmt(rem) + ' remaining' : 'Goal reached!') + '</span>' +
        '<button class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-medium" style="background:rgba(122,170,206,0.10);color:var(--c-focus);" onclick="event.stopPropagation();showAddEarmark(' + idx + ')"><i data-lucide="plus" class="w-3 h-3"></i> Allocate</button>' +
      '</div></div>';
  }).join('');

  return (
    '<h1 class="text-2xl font-bold" style="color:var(--c-primary);">Goals</h1>' +
    '<p class="page-subtitle">Earmark money from wallets and assets toward your savings targets</p>' +
    '<div class="card p-4 mb-4" style="display:flex;align-items:center;justify-content:space-between;">' +
      '<div><div class="text-[10px] uppercase" style="color:var(--c-sub);">Total Earmarked</div><div class="mono text-lg font-bold text-[#355872]">Rp' + fmt(totalEarmarked) + '</div><div class="text-[9px] mt-0.5" style="color:var(--c-sub);">across ' + M.goals.length + ' goals</div></div>' +
      '<button class="btn-primary px-4 py-2 rounded-lg text-sm flex items-center gap-1.5" onclick="showAddGoal()"><i data-lucide="plus" class="w-4 h-4"></i> New Goal</button>' +
    '</div>' +
    goalCards
  );
}

function applyTransfer() {
  var from = document.getElementById('tfFrom').value;
  var to = document.getElementById('tfTo').value;
  var amt = parseInt(document.getElementById('tfAmount').value) || 0;
  var notes = document.getElementById('tfNotes').value;
  if (!amt || from === to) return;
  M.wallets.forEach(function(w) { if (w.name === from) w.balance -= amt; if (w.name === to) w.balance += amt; });
  var today = new Date().toISOString().slice(0, 10);
  M.transfers.unshift({ date: today, from: from, to: to, amount: amt, notes: notes });
  M.walletTxns.unshift({ date: today, wallet: from, type: 'transfer_out', amount: amt, target: to, desc: notes || 'Transfer to ' + to });
  M.walletTxns.unshift({ date: today, wallet: to, type: 'transfer_in', amount: amt, source: from, desc: notes || 'Transfer from ' + from });
  navigate('wallets');
}

function applyWalletExpense(idx) {
  var w = M.wallets[idx];
  var amt = parseInt(document.getElementById('weAmt').value) || 0;
  if (!amt) return;
  var free = typeof walletFree === 'function' ? walletFree(w.name) : w.balance;
  if (amt > free) {
    var into = amt - free;
    var goals = M.earmarks.filter(function(e) { return e.source === w.name; }).map(function(e) { return e.goal; }).join(', ');
    alert('Warning: Spending Rp' + fmt(amt) + ' exceeds free balance (Rp' + fmt(free) + '). Rp' + fmt(into) + ' will come from earmarked goals: ' + (goals || 'none') + '.');
  }
  M.walletTxns.unshift({ date: document.getElementById('weDate').value, wallet: w.name, type: 'expense', amount: amt, cat: document.getElementById('weCat').value, desc: document.getElementById('weDesc').value });
  navigate('wallets');
}

        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Interest Rate (%)</label><input id="ecInt" type="number" step="0.1" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + c.bunga + '"></div>' +
      '</div>' +
      '<button class="btn-primary w-full py-2 rounded-lg text-sm" onclick="applyEditCicilan(' + idx + ');closeModal();">Save Changes</button>' +
    '</div>'
  );
}
function applyEditCicilan(idx) {
  var c = M.cicilan[idx];
  c.sisa = parseInt(document.getElementById('ecRem').value) || c.sisa;
  c.monthly = parseInt(document.getElementById('ecMon').value) || c.monthly;
  c.bunga = parseFloat(document.getElementById('ecInt').value) || c.bunga;
  navigate('cicilan');
}

function showEditCreditCard(idx) {
  var c = M.creditCards[idx];
  if (!c) return;
  openModal('Edit ' + c.name,
    '<div style="display:flex;flex-direction:column;gap:12px;">' +
      '<div class="grid grid-cols-2 gap-3">' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Current Balance (IDR)</label><input id="eccBal" type="number" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + c.balance + '"></div>' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Credit Limit (IDR)</label><input id="eccLim" type="number" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + c.limit + '"></div>' +
      '</div>' +
      '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Interest Rate (%/month)</label><input id="eccInt" type="number" step="0.01" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + c.interestRate + '"></div>' +
      '<div class="grid grid-cols-2 gap-3">' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Statement Day</label><input id="eccStmt" type="number" min="1" max="31" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + c.statementDay + '"></div>' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Due Day</label><input id="eccDue" type="number" min="1" max="31" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + c.dueDay + '"></div>' +
      '</div>' +
      '<button class="btn-primary w-full py-2 rounded-lg text-sm" onclick="applyEditCreditCard(' + idx + ');closeModal();">Save Changes</button>' +
    '</div>'
  );
}
function applyEditCreditCard(idx) {
  var c = M.creditCards[idx];
  c.balance = parseInt(document.getElementById('eccBal').value) || c.balance;
  c.limit = parseInt(document.getElementById('eccLim').value) || c.limit;
  c.interestRate = parseFloat(document.getElementById('eccInt').value) || c.interestRate;
  c.statementDay = parseInt(document.getElementById('eccStmt').value) || c.statementDay;
  c.dueDay = parseInt(document.getElementById('eccDue').value) || c.dueDay;
  navigate('creditcard');
}

function showAddDeposit() {
  openModal('Add Deposit',
    '<div style="display:flex;flex-direction:column;gap:12px;">' +
      '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Bank</label><input id="adBank" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" placeholder="e.g. BCA"></div>' +
      '<div class="grid grid-cols-2 gap-3">' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Amount (IDR)</label><input id="adAmt" type="number" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" placeholder="0"></div>' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Rate (% p.a.)</label><input id="adRate" type="number" step="0.1" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" placeholder="4.5"></div>' +
      '</div>' +
      '<div class="grid grid-cols-2 gap-3">' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Tenor (months)</label><input id="adTenor" type="number" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" placeholder="6"></div>' +
        '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Start Date</label><input id="adStart" type="date" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="2026-07-01"></div>' +
      '</div>' +
      '<button class="btn-primary w-full py-2 rounded-lg text-sm" onclick="applyAddDeposit();closeModal();">Save Deposit</button>' +
    '</div>'
  );
}
function applyAddDeposit() {
  var bank = document.getElementById('adBank').value;
  var amt = parseInt(document.getElementById('adAmt').value) || 0;
  var rate = parseFloat(document.getElementById('adRate').value) || 0;
  var tenor = parseInt(document.getElementById('adTenor').value) || 0;
  var start = document.getElementById('adStart').value;
  if (!bank || !amt) return;
  var mat = new Date(start);
  mat.setMonth(mat.getMonth() + tenor);
  var matStr = mat.toISOString().slice(0, 7);
  M.deposits.push({ bank: bank, amount: amt, rate: rate, tenor: tenor, start: start, maturity: matStr, status: 'active' });
  navigate('assets');
}

function showEditPortfolio(idx) {
  var p = M.portfolios[idx];
  if (!p) return;
  openModal('Edit ' + p.name,
    '<div style="display:flex;flex-direction:column;gap:12px;">' +
      '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Account Name</label><input id="epName" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + p.name + '"></div>' +
      '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Current Value (IDR)</label><input id="epVal" type="number" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" value="' + p.value + '"></div>' +
      '<button class="btn-primary w-full py-2 rounded-lg text-sm" onclick="applyEditPortfolio(' + idx + ');closeModal();">Save</button>' +
    '</div>'
  );
}
function applyEditPortfolio(idx) {
  var p = M.portfolios[idx];
  p.name = document.getElementById('epName').value || p.name;
  p.value = parseInt(document.getElementById('epVal').value) || p.value;
  navigate('assets');
}

function showAddPortfolio() {
  openModal('Add Investment Account',
    '<div style="display:flex;flex-direction:column;gap:12px;">' +
      '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Account Name</label><input id="apName" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" placeholder="e.g. RDN Mirae"></div>' +
      '<div><label class="block text-xs mb-1" style="color:var(--c-sub);">Current Value (IDR)</label><input id="apVal" type="number" class="w-full px-3 py-2 rounded-lg border text-sm" style="border-color:var(--c-focus);background:#fff;color:var(--c-ink);" placeholder="0"></div>' +
      '<button class="btn-primary w-full py-2 rounded-lg text-sm" onclick="applyAddPortfolio();closeModal();">Save</button>' +
    '</div>'
  );
}
function applyAddPortfolio() {
  var name = document.getElementById('apName').value;
  var val = parseInt(document.getElementById('apVal').value) || 0;
  if (!name) return;
  M.portfolios.push({ name: name, value: val });
  navigate('assets');
}

</script>
</body>
</html>
